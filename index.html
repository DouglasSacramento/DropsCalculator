<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calcular gotas</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="card">
      <main>
        <h1>Calculadora de gotas</h1>
        <span>(Psicotrópicos)</span>
        <section id="choose">
          <select name="options" id="options" onchange="clearResult()>
            <option value="Selecione">Selecione</option>
            <option value="clonazepan">Clonazepan</option>
            <option value="clorpromazina">Clorpromazina</option>
            <option value="fenobarbital">Fenobarbital</option>
            <option value="haloperidol">Haloperidol</option>
            <option value="levomepromazina">Levomepromazina</option>
            <option value="periciazina">Periciazina</option>
          </select>
          <form>
            <input type="text" placeholder="Total gotas diária" />
            <button>Calcular</button>
          </form>
        </section>
        <section id="result">
          <h2></h2>
          <p></p>
        </section>
      </main>
    </div>
    <footer>
      <p>By DouglasSacramento &copy</p>
    </footer>
  </body>
</html>
